name: Bug report
description: Report a defect in the package.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the fields below — a minimal reproduction is the single most useful thing you can include.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly. What did you do, what did you expect, what did you get?
      placeholder: When I run `product-schema:apply`, ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: The smallest schema definition file, test, or sequence of commands that triggers the bug.
      render: php
    validations:
      required: true
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: lunar-version
    attributes:
      label: Lunar core version
      placeholder: 1.3.x
    validations:
      required: true
  - type: input
    id: laravel-version
    attributes:
      label: Laravel version
      placeholder: 12.x
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: 8.3
    validations:
      required: true
  - type: input
    id: db
    attributes:
      label: Database driver
      placeholder: mysql 8.0 / pgsql 16 / sqlite
    validations:
      required: true
  - type: textarea
    id: stack-trace
    attributes:
      label: Stack trace / output
      description: Full error output, ideally with `--verbose` if it came from an artisan command.
      render: shell
